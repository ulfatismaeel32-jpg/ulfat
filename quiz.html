<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My information</title>
        <style>
        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap : 10px;
        }
    </style>
</head>

<body>
    <h1>Muslim's Test</h1>
    <div id="list"></div>
    <button onclick="answer()">check</button>
    <p id="result"></p>
    <script>
        let quiz = [
            { Q: "Hamey kiss ny bnaya ?", anse: "ALLAH Ny" },
            { Q: "Hamara nabi kon hai  ?", anse: "Hazrat Muhammad" },
            { Q: "Hamara dein kia hai ?", anse: "Islam" }
        ];
        let html = "";
        for (let i = 0; i < quiz.length; i++) {
            html = html + "<p>" + quiz[i].Q ;
            html = html + "<input id='ans" + i + "' type='text'>";
            html = html + "</p>";
        }
        document.getElementById("list").innerHTML = html;
        function answer() {
            let score = 0;

            for (let i = 0; i < quiz.length; i++) {
let userKaJawab = document.getElementById("ans" + i ).value;

                if (userKaJawab === quiz[i].anse) {
                    score = score + 1;
                }
            }

            document.getElementById("result").textContent =
                "Tumne " + quiz.length + " mein se " + score + " sahi kiye!";
        }

    </script>
</body>

</html>
