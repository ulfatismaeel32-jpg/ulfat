<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My information</title>
</head>

<body>
    <h1>let's know the temperature of your city</h1>
    <input id="cityInput" type="text" placeholder="city ka naam likhoo">
    <button id="searchBtn">click here</button>
    <div id="mosumCard"></div>
    <script>

let input = document.querySelector("#cityInput");
let btn = document.querySelector("#searchBtn");
btn.addEventListener("click",async function(){
    let city = input.value;
    let res = await fetch("https://geocoding-api.open-meteo.com/v1/search?name=" + city +"&count=1");
    let geo = await res.json();
    let lat = geo.results[0].latitude;
     let lon = geo.results[0].longitude;

            let res2 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon + "&current=weather_code,temperature_2m");
            let data = await res2.json();
     let card = document.querySelector("#mosumCard");
        card.innerHTML=
        "<h1>" + city + " ka mousum</h1>" +
        "<p>weather : "+ data.current.weather_code + " </p>" +
          "<p>Temperature : "+ data.current.temperature_2m + " </p>";
    });
    </script>
</body>

</html>
