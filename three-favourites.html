<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Favourite Things</title>
</head>
<body>

    <figure>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Oryctolagus_cuniculus_Rcdo.jpg/250px-Oryctolagus_cuniculus_Rcdo.jpg"
            alt="A rabbit in a field">
        <figcaption>A rabbit is looking forward</figcaption>
    </figure>

    <figure>
        <img src="https://hips.hearstapps.com/hmg-prod/images/beautiful-australian-shepherd-walking-royalty-free-image-168814214-1565190235.jpg?crop=0.66832xw:1xh;center,top"
            alt="A dog who has a ball in his mouth">
        <figcaption>A dog is playing with a ball</figcaption>
    </figure>

    <figure>
        <img src="https://i.natgeofe.com/k/9acd2bad-fb0e-43a8-935d-ec0aefc60c2f/monarch-butterfly-grass.jpg"
            alt="A butterfly sitting on grass">
        <figcaption>A butterfly is resting on grass</figcaption>
    </figure>

    <ol>
        <li>Rabbit — my top favourite animal</li>
        <li>Dog</li>
        <li>Butterfly</li>
    </ol>

    <ul>
        <li>Rabbits are very harmless animals</li>
        <li>They can be kept as pets</li>
        <li>They eat grass and vegetables</li>
    </ul>

</body>
</html>
