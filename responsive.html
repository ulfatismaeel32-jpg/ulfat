<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My title</title>
    <style>
        .card1 {
            background-color: pink;
            border: 2px solid black;
        }

        .card2 {
            background-color: green;
            border: 2px solid black;
        }

        .card3 {
            background-color: red;
            border: 2px solid black;
        }

        .card4 {
            background-color: yellow;
            border: 2px solid black;
        }

        .card5 {
            background-color: seagreen;
            border: 2px solid black;
        }

        .card6 {
            background-color: purple;
            border: 2px solid black;
        }

        .container {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(1, 200px);
        }

        @media(min-width: 768px) {
            .container {
                grid-template-columns: repeat(2, 200px);
            }
        }

        @media(min-width: 1024px) {
            .container {
                grid-template-columns: repeat(3, 200px);
            }
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="card1">
            <h1>
                Rabbit
            </h1>
            <p>the best animal forever </p>
        </div>
        <div class="card2">
            <h1>
                Dog
            </h1>
            <p>Faithful animal</p>
        </div>
        <div class="card3">
            <h1>
                Cat
            </h1>
            <p>the most beautiful animal</p>
        </div>
        <div class="card4">
            <h1>
                butterfly
            </h1>
            <p>the most cute one </p>
        </div>
        <div class="card5">
            <h1>
                Cow
            </h1>
            <p>best for milk</p>
        </div>
        <div class="card6">
            <h1>
                Hen
            </h1>
            <p>best option for eggs</p>
        </div>
    </div>
</body>

</html>
