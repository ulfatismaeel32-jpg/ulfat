<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Sign Up</h1>
  </header>
  <main>
    <form class="signup-form">
      <label for="username">Name</label>
      <input type="text" id="username" required class="form-input">
      <label for="email">email</label>
      <input type="email" id="email" required class="form-input">
      <label for="password">password</label>
      <input type="password" id="password" required class="form-input">
      <label for="message">message</label>

      <textarea id="message" class="form-input"></textarea>
      <input type="submit" value="Sign Me Up">

    </form>
  </main>
  <footer>
<p>
  ulfat 2025
</p>
  </footer>
</body>

</html>
