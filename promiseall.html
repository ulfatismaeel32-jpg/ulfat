<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My information</title>
</head>

<body>
    <h1>let's know the temperature of karachi and lahore respectively</h1>
  
    <div id="mosumCard"></div>
    <script >
           async function musum()
        {
        let card = document.querySelector("#mosumCard");
         card.innerHTML = "<p>loading...</p>";
        try {
        
            let [karachi, lahore] = ["karachi", "lahore"];
        let [karachiData, lahoreData] = await Promise.all([
            fetch("https://api.open-meteo.com/v1/forecast?latitude=24.86&longitude=67.01&current=weather_code").then(r => r.json()),
            fetch("https://api.open-meteo.com/v1/forecast?latitude=31.55&longitude=74.34&current=weather_code").then(r => r.json())
        ]);
        console.log("Temperature:", karachiData.current.weather_code);
        console.log("Temperature:", lahoreData.current.weather_code);

        card.innerHTML =
            "<h1>karachi ka mousam</h1>" +
            "<p>weather : " + karachiData.current.weather_code + " </p>" +

            "<h1>lahore ka mousum</h1>" +
            "<p>weather : " + lahoreData.current.weather_code + " </p>"
    }
    catch (error) {
        card.innerHTML = "<p>sorry network problem!!!</p>";
    }
}

musum();

    </script>
</body>

</html>
