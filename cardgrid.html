<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My information</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap:10px;
        }

        .card1 {
            background-color: pink;
            border: 2px solid black;
        }

        .card2 {
            background-color: green;
            border: 2px solid black;
        }

        .card3 {
            background-color: red;
            border: 2px solid black;
        }

        .card4{
            background-color: yellow;
            border: 2px solid black;
        }

        .card5 {
            background-color: seagreen;
            border: 2px solid black;
        }

        .card6 {
            background-color: purple;
            border: 2px solid black;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card1">
            <h1>
                html
            </h1>
            <p>it stands for hyper text markup language</p>
        </div>
        <div class="card2">
            <h1>
                css
            </h1>
            <p>it stands for cascading style sheet</p>
        </div>
        <div class="card3">
            <h1>
                js
            </h1>
            <p>it stands for java script</p>
        </div>
        <div class="card4">
            <h1>
                c++
            </h1>
            <p>it is prounounced as c plus plus</p>
        </div>
        <div class="card5">
            <h1>
                c#
            </h1>
            <p>it is prounounced as c sharp</p>
        </div>
        <div class="card6">
            <h1>
                basics
            </h1>
            <p>it is a proramming language , used by students</p>
        </div>
    </div>
</body>

</html>
